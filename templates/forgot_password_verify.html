<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify OTP — Gold Price Forecast</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-page">
  <div class="login-card login-card-wide">
    <div class="brand">
      <span class="brand-icon">Au</span>
      <h1>Enter OTP</h1>
      <p>We sent a 6-digit code to <strong>{{ email }}</strong></p>
    </div>
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    {% if success %}
    <div class="alert alert-success">{{ success }}</div>
    {% endif %}
    <form method="post" action="{{ url_for('forgot_password_verify') }}" class="login-form">
      <label for="otp">OTP code</label>
      <input type="text" id="otp" name="otp" placeholder="123456" required maxlength="6" pattern="[0-9]{6}" inputmode="numeric" autocomplete="one-time-code">

      <label for="password">New password</label>
      <input type="password" id="password" name="password" placeholder="Min. 8 characters" required autocomplete="new-password">

      <label for="confirm_password">Confirm new password</label>
      <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat new password" required autocomplete="new-password">

      <button type="submit" class="btn btn-primary">Reset password</button>
    </form>
    <form method="post" action="{{ url_for('forgot_password_resend') }}" class="resend-form">
      <button type="submit" class="btn btn-ghost btn-block">Resend OTP</button>
    </form>
    <p class="auth-links"><a href="{{ url_for('forgot_password') }}">Use different email</a> · <a href="{{ url_for('login') }}">Sign in</a></p>
  </div>
</body>
</html>
