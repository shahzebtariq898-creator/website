<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign up — Gold Price Forecast</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-page">
  <div class="login-card login-card-wide">
    <div class="brand">
      <span class="brand-icon">Au</span>
      <h1>Create account</h1>
      <p>Register to access gold forecasts</p>
    </div>
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    {% if success %}
    <div class="alert alert-success">{{ success }}</div>
    {% endif %}
    <form method="post" action="{{ url_for('signup') }}" class="login-form">
      <label for="name">Full name</label>
      <input type="text" id="name" name="name" placeholder="Your name" required autocomplete="name" value="{{ form.name or '' }}">

      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email" value="{{ form.email or '' }}">

      <label for="phone">Phone number</label>
      <input type="tel" id="phone" name="phone" placeholder="03XX XXXXXXX" required autocomplete="tel" value="{{ form.phone or '' }}">

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Min. 8 characters" required autocomplete="new-password">

      <label for="confirm_password">Confirm password</label>
      <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat password" required autocomplete="new-password">

      <button type="submit" class="btn btn-primary">Sign up</button>
    </form>
    <p class="auth-links">Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
  </div>
</body>
</html>
