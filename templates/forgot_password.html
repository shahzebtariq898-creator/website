<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot password — Gold Price Forecast</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="login-page">
  <div class="login-card login-card-wide">
    <div class="brand">
      <span class="brand-icon">Au</span>
      <h1>Forgot password</h1>
      <p>Enter your email — we will send a 6-digit OTP</p>
    </div>
    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    {% if success %}
    <div class="alert alert-success">{{ success }}</div>
    {% endif %}
    <form method="post" action="{{ url_for('forgot_password') }}" class="login-form">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email" value="{{ form.email or '' }}">

      <button type="submit" class="btn btn-primary">Send OTP</button>
    </form>
    <p class="auth-links"><a href="{{ url_for('login') }}">Back to sign in</a></p>
  </div>
</body>
</html>
